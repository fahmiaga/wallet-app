name: PR Agent Open Source

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  pr_agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Check PR size and add label if large
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const additions = pr.additions;
            const deletions = pr.deletions;
            const totalChanges = additions + deletions;

            console.log(`Total changes: ${totalChanges}`);

            const threshold = 1;

            if (totalChanges > threshold) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ["Large PR"]
              });
              console.log("Label 'Large PR' added.");
            } else {
              console.log("PR size is within acceptable limit.");
            }

      - name: Run PR Agent
        uses: fahmiaga/qodo@add-custom-label-feature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          config.model: "gemini/gemini-2.5-pro"
          config.fallback_models: '["gemini/gemini-2.5-flash"]'

          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"