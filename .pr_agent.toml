[config]
disable_auto_feedback = false
enable_custom_labels = true
enable_auto_large_pr_label = true
auto_label_large_pr_threshold = 1
auto_label_large_pr_label_name = "large-pr"

[pull_request]
review = true                   
review_comment_lgtm = true
inline_code_comments = true      
summarize = true                 
on_push_update = false           

[pull_request_commands]
enabled = true
review = true
generate_labels = true

[rules.ruby]
security = true
bugs = true
style = false                    
performance = true

[rules.javascript]
eslint = true

[custom_labels."large-pr"]
description = """
pr_agent: Apply this label if the PR represents a large or complex change,
including one or more of the following:
- Changes across many files or directories
- Significant refactors
- Modifications to core business logic
- Database schema changes or migrations
- Updates affecting multiple system layers (frontend, backend, API)
- Introduction of new features rather than small fixes
These PRs typically require higher review effort and careful review.
"""